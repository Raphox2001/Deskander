<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="/static/css/kiosk.css?v={{ asset_version }}">
</head>
<body>
  <div class="dashboard">
    <section class="panel clock">
      <div class="datetime">
        <div id="current-date" class="current-date"></div>
        <div id="current-time" class="current-time"></div>
      </div>
    </section>

    <section class="panel weather">
      <div id="weather-current" class="weather-current"></div>
      <div id="weather-forecast" class="weather-forecast"></div>
    </section>

    <section class="panel agenda">
      <h2 id="agenda-date">Aktuelle Termine</h2>
      <div id="allday-row" class="allday-row"></div>
      <div class="timeline-wrap">
        <div id="timeline-hours" class="timeline-hours"></div>
        <div id="timeline-track" class="timeline-track"></div>
      </div>
      <p id="timeline-empty" class="agenda-empty"></p>
    </section>

    <section class="panel calendar">
      <div id="calendar-weekdays" class="calendar-weekdays"></div>
      <div id="calendar-grid" class="calendar-grid"></div>
    </section>
  </div>

  <div id="update-banner" class="update-banner"></div>

  <div id="reminder-popup" class="reminder-popup" hidden>
    <div id="reminder-card" class="reminder-card">
      <div class="reminder-countdown" id="reminder-countdown"></div>
      <div class="reminder-source" id="reminder-source"></div>
      <h2 class="reminder-title" id="reminder-title"></h2>
      <div class="reminder-time" id="reminder-time"></div>
      <div class="reminder-detail reminder-location" id="reminder-location"></div>
      <div class="reminder-detail reminder-attendees" id="reminder-attendees"></div>
      <div class="reminder-detail reminder-notes" id="reminder-notes"></div>
      <div class="reminder-travel" id="reminder-travel"></div>
    </div>
  </div>

  <div id="admin-url" class="status-bar status-bar-left"></div>
  <div id="status-bar" class="status-bar status-bar-right"></div>

  <script src="/static/js/kiosk.js?v={{ asset_version }}"></script>
</body>
</html>
