{% extends "admin/base.html" %}
{% block content %}

<h2>{{ "Kalenderquelle bearbeiten" if source and source.id else "Neue Kalenderquelle" }}</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post" class="form">
  <label>Name
    <input type="text" name="name" required value="{{ source.name if source else '' }}">
  </label>
  <label>iCal-URL
    <input type="url" name="url" required value="{{ source.url if source else '' }}">
  </label>
  <label>Farbe
    <input type="color" name="color" value="{{ source.color if source else '#4a90d9' }}">
  </label>
  <label class="checkbox">
    <input type="checkbox" name="enabled" {% if not source or source.enabled %}checked{% endif %}>
    Aktiv
  </label>
  <div class="form-actions">
    <button type="submit">Speichern</button>
    <a href="/admin">Abbrechen</a>
  </div>
</form>
{% endblock %}
